<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RespireLYF — Unified Analytics Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#f0f3fa; --white:#ffffff; --border:#e3e8f3; --border2:#c8d3ea;
  --t1:#0d1526; --t2:#2d3a52; --t3:#5c6e8a; --t4:#8fa0b8;
  --apple:#1d55d9; --apl:#ebf2ff; --apb:#b9d0fd;
  --yt:#d42b2b; --ytl:#fff0f0; --ytb:#fbbfbf;
  --meta:#6830d8; --mtl:#f4efff; --mtb:#d4bffc;
  --grn:#0a8a5f; --gnl:#eafaf4; --gnb:#9de8cb;
  --org:#c97209; --ogl:#fff8eb; --ogb:#f9d98a;
  --gads:#1a73e8; --gadl:#e8f0fe; --gadb:#aecbfa;
  --fb:#1877f2; --fbl:#e7f3ff; --fbb:#bad3fb;
  --tw:#1da1f2; --twl:#e8f5fe; --twb:#b9e0fd;
  --rd:#ff4500; --rdl:#fff3ef; --rdb:#ffc4ae;
  --sh:0 1px 4px rgba(13,21,38,.06); --sh2:0 6px 24px rgba(13,21,38,.10); --sh3:0 2px 8px rgba(13,21,38,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);line-height:1.55;-webkit-font-smoothing:antialiased}

/* HEADER */
.header{background:var(--white);border-bottom:1px solid var(--border);padding:0 40px;display:flex;align-items:stretch;gap:0;box-shadow:var(--sh3);position:sticky;top:0;z-index:500;min-height:58px}
.hbrand{display:flex;align-items:center;gap:12px;padding:10px 0;border-right:1px solid var(--border);padding-right:22px;margin-right:20px;flex-shrink:0}
.logo-wrap{width:38px;height:38px;border-radius:10px;background:#000;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.3);flex-shrink:0}
.logo-svg{width:24px;height:24px}
.btext h1{font-size:15px;font-weight:800;color:var(--t1);letter-spacing:-.3px;line-height:1.2}
.btext p{font-size:9.5px;color:var(--t4);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
.hnav{display:flex;align-items:stretch;gap:0;flex:1;overflow-x:auto}
.hnav::-webkit-scrollbar{display:none}
.hn{display:flex;align-items:center;padding:0 13px;font-size:10.5px;font-weight:600;color:var(--t3);text-decoration:none;white-space:nowrap;border-bottom:3px solid transparent;transition:color .15s,border-color .15s}
.hn:hover{color:var(--t1)}
.hn.act{color:var(--apple);border-bottom-color:var(--apple)}

/* TAB PANES */
.tab-pane{display:none}
.tab-pane.active{display:block}
/* Button reset for nav tabs */
button.hn{background:none;border:none;cursor:pointer;font-family:inherit;border-bottom:3px solid transparent}
.hright{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0;padding:10px 0;flex-wrap:wrap}
.hlast{font-size:10px;color:var(--t4);white-space:nowrap}

/* PAGE */
.page{padding:32px 40px;max-width:1760px}
.sec{margin-bottom:48px}
.stitle{display:flex;align-items:center;gap:14px;margin-bottom:22px;padding-bottom:14px;border-bottom:2px solid var(--border)}
.snum{width:30px;height:30px;border-radius:8px;background:var(--apple);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stitle h2{font-size:19px;font-weight:800;color:var(--t1);letter-spacing:-.4px}
.stitle p{font-size:11px;color:var(--t3);margin-top:3px}

/* KPI BAND */
.kband{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
.kband3{grid-template-columns:repeat(3,1fr)}
.kband4{grid-template-columns:repeat(4,1fr)}
.kband5{grid-template-columns:repeat(5,1fr)}
.kband6{grid-template-columns:repeat(6,1fr)}
.kband10{grid-template-columns:repeat(5,1fr)}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:13px;padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden;cursor:default;transition:box-shadow .2s,transform .15s}
.kpi:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--apple));border-radius:13px 13px 0 0}
.klbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t4);margin-bottom:8px}
.kval{font-size:26px;font-weight:900;color:var(--t1);line-height:1;letter-spacing:-.6px;margin-bottom:5px}
.ksub{font-size:11px;color:var(--t3)}
.ksub.up{color:var(--grn);font-weight:600}
.ksub.dn{color:var(--yt);font-weight:600}
.ksub.wa{color:var(--org);font-weight:600}
.kpi.nd{opacity:.35;pointer-events:none}
.kpi.nd .kval{color:var(--t4)}

/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:15px;padding:22px;box-shadow:var(--sh);margin-bottom:18px;transition:box-shadow .2s}
.card:hover{box-shadow:var(--sh2)}
.card.no-data{background:#fafbfc;border:2px dashed var(--ogb);position:relative}
.card.no-data::after{content:'No Data';position:absolute;top:12px;right:14px;background:var(--ogl);border:1px solid var(--ogb);color:var(--org);font-size:9px;font-weight:800;padding:2px 8px;border-radius:6px;letter-spacing:.5px;text-transform:uppercase}
.card.data-ok{border-left:4px solid var(--grn)}
.ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.ch h3{font-size:13.5px;font-weight:700;color:var(--t1);letter-spacing:-.15px}
.ch p{font-size:11px;color:var(--t3);margin-top:3px}
.ctag{font-size:9px;font-weight:800;padding:3px 9px;border-radius:7px;border:1px solid;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.cta{background:var(--apl);border-color:var(--apb);color:var(--apple)}
.cty{background:var(--ytl);border-color:var(--ytb);color:var(--yt)}
.ctm{background:var(--mtl);border-color:var(--mtb);color:var(--meta)}
.ctg{background:var(--gnl);border-color:var(--gnb);color:var(--grn)}
.cto{background:var(--ogl);border-color:var(--ogb);color:var(--org)}
.ctx{background:#f0f4fa;border-color:var(--border2);color:var(--t2)}
.ctfb{background:var(--fbl);border-color:var(--fbb);color:var(--fb)}
.cttw{background:var(--twl);border-color:var(--twb);color:var(--tw)}
.ctrd{background:var(--rdl);border-color:var(--rdb);color:var(--rd)}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.g31{display:grid;grid-template-columns:2fr 1fr;gap:18px}
.g211{display:grid;grid-template-columns:2fr 1fr 1fr;gap:18px}
.g13{display:grid;grid-template-columns:1fr 2fr;gap:18px}
.g32{display:grid;grid-template-columns:3fr 2fr;gap:18px}
.g23{display:grid;grid-template-columns:2fr 3fr;gap:18px}

/* CHART HEIGHTS */
.csm canvas{max-height:180px}
.cmd canvas{max-height:250px}
.clg canvas{max-height:310px}
.cxl canvas{max-height:380px}

/* LEGEND */
.leg{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2);font-weight:500}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lr{width:18px;height:8px;border-radius:3px;flex-shrink:0}

/* PILLS */
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.pa{background:var(--apl);color:var(--apple)}
.py{background:var(--ytl);color:var(--yt)}
.pm{background:var(--mtl);color:var(--meta)}
.pg{background:var(--gnl);color:var(--grn)}
.po{background:var(--ogl);color:var(--org)}
.px{background:#f0f4fa;color:var(--t4)}
.pG{background:#d1fae5;color:#065f46}
.pR{background:#fee2e2;color:#b91c1c}
.pfb{background:var(--fbl);color:var(--fb)}
.ptw{background:var(--twl);color:var(--tw)}
.prd{background:var(--rdl);color:var(--rd)}

/* CALLOUT BOXES */
.box{padding:13px 16px;border-radius:11px;border:1px solid;font-size:12px;line-height:1.7;margin-bottom:14px;display:flex;gap:11px;align-items:flex-start}
.bico{font-size:16px;flex-shrink:0;margin-top:1px}
.bblue{background:var(--apl);border-color:var(--apb);color:#1a3d9e}
.bgreen{background:var(--gnl);border-color:var(--gnb);color:#065f46}
.borg{background:var(--ogl);border-color:var(--ogb);color:#7c4a0a}
.bred{background:var(--ytl);border-color:var(--ytb);color:#8b1717}
.bpur{background:var(--mtl);border-color:var(--mtb);color:#42188e}
.bgrey{background:#f7f9ff;border-color:var(--border2);color:var(--t2)}
.box strong{font-weight:700}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead th{padding:10px 13px;text-align:left;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--t4);border-bottom:2px solid var(--border);background:#f7f9ff;white-space:nowrap}
.tbl tbody td{padding:9px 13px;border-bottom:1px solid #f2f5fb;vertical-align:middle}
.tbl tbody tr:hover{background:#fafbff}
.tbl tfoot td{padding:10px 13px;font-weight:700;border-top:2px solid var(--border2);background:#f7f9ff;font-size:12px}
.ra{background:#fafcff!important}
.ry{background:#fff8f8!important}
.num{font-weight:600}
.gt{color:var(--grn);font-weight:700}
.ot{color:var(--org);font-weight:600}
.rt{color:var(--yt);font-weight:600}
.dt{color:var(--t4)}

/* KW BAR */
.kwbar{display:flex;align-items:center;gap:8px}
.kwtrk{flex:1;height:7px;background:#e8eef7;border-radius:4px;overflow:hidden}
.kwfil{height:100%;border-radius:4px}

/* FUNNEL */
.fn{display:flex;flex-direction:column;gap:5px}
.fstep{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:11px;border:1px solid;position:relative;overflow:hidden}
.fbg{position:absolute;left:0;top:0;bottom:0;pointer-events:none}
.fic{font-size:19px;flex-shrink:0;position:relative;z-index:1}
.ftx{flex:1;position:relative;z-index:1}
.ftx strong{display:block;font-size:13px;font-weight:700;color:var(--t1)}
.ftx small{font-size:11px;color:var(--t2)}
.fnum{font-size:24px;font-weight:900;color:var(--t1);position:relative;z-index:1;letter-spacing:-.6px}
.fdrop{text-align:center;font-size:11px;color:var(--t3);padding:2px 0}
.fdrop em{color:var(--yt);font-style:normal;font-weight:700}

/* RET BARS */
.rrow{display:flex;align-items:center;gap:11px;margin-bottom:9px}
.rlbl{width:90px;font-size:11px;color:var(--t2);font-weight:500}
.rtrk{flex:1;background:#e8eef7;border-radius:5px;height:11px;overflow:hidden}
.rfil{height:100%;border-radius:5px}
.rval{width:44px;text-align:right;font-size:12px;font-weight:800}
.rimp{width:88px;text-align:right;font-size:11px;color:var(--t3)}

/* STATUS DOTS */
.ch-status{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.cs-ok{background:#22c55e}
.cs-warn{background:#f59e0b}
.cs-off{background:#cbd5e1}

/* NO DATA PLACEHOLDER */
.nd-wrap{text-align:center;padding:32px 20px;color:var(--t4)}
.nd-wrap .nd-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.nd-wrap h4{font-size:13px;font-weight:700;color:var(--t3);margin-bottom:6px}
.nd-wrap p{font-size:11px;line-height:1.7}

/* SQL BLOCK */
.sql-block{background:#1e2433;border-radius:11px;padding:18px 20px;font-family:'Courier New',monospace;font-size:11.5px;color:#a8d8ff;line-height:1.8;overflow-x:auto;margin-top:10px}
.sql-block .sql-comment{color:#6b7d9e}
.sql-block .sql-kw{color:#7ec8e3;font-weight:600}
.sql-block .sql-str{color:#a8d88a}

/* INSIGHT CARDS */
.ins-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.ins-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:var(--sh);position:relative}
.ins-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ic,var(--apple));border-radius:14px 14px 0 0}
.ins-prio{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:10px}
.prio-imm{background:#fee2e2;color:#b91c1c}
.prio-hi{background:var(--ogl);color:var(--org)}
.prio-med{background:#f0f4fa;color:var(--t2)}
.ins-card h4{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:6px}
.ins-card p{font-size:11.5px;color:var(--t3);line-height:1.65}
.ins-meta{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.ins-tag{font-size:10px;font-weight:600;color:var(--t4);background:#f0f4fa;padding:2px 8px;border-radius:5px}

/* PLATFORM TABLE */
.plat-table{width:100%;border-collapse:collapse;font-size:12px}
.plat-table th{padding:9px 12px;text-align:left;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--t4);border-bottom:2px solid var(--border);background:#f7f9ff}
.plat-table td{padding:10px 12px;border-bottom:1px solid #f2f5fb;vertical-align:middle}
.plat-table tr:hover td{background:#fafbff}
.plat-name{display:flex;align-items:center;gap:9px;font-weight:600;color:var(--t1)}
.plat-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* SUBSECTION DIVIDER */
.subdiv{margin:28px 0 24px;border:none;border-top:1px solid var(--border)}
.subhead{font-size:15px;font-weight:800;color:var(--t1);letter-spacing:-.2px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.subhead .stag{font-size:9px;font-weight:700;padding:2px 9px;border-radius:6px;border:1px solid}

/* WEEKLY SECTION HEADER */
.wsec{font-size:11px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

@media(max-width:1100px){
  .g2,.g3,.g31,.g211,.g13,.g32,.g23{grid-template-columns:1fr}
  .ins-grid{grid-template-columns:1fr 1fr}
  .page{padding:18px}
  .header{padding:0 16px}
  .kband{grid-template-columns:repeat(2,1fr)}
  .kband5,.kband6,.kband10{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){
  .ins-grid{grid-template-columns:1fr}
  .kband{grid-template-columns:1fr 1fr}
  .hnav{display:none}
  .hright{display:none}
}
</style>
</head>

<script>
// ══════════════════════════════════════════════════════════
//  SUPABASE CONFIG
// ══════════════════════════════════════════════════════════
const SUPABASE_URL  = 'https://jxanvdhpqzxehupxkmee.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4YW52ZGhwcXp4ZWh1cHhrbWVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTkwNTgsImV4cCI6MjA4ODczNTA1OH0.h6qE5jP6Mca8Y3coiJhZWyI5ijHJedk-wnlTMR-P6xY';


// ── Supabase helpers ──────────────────────────────────────
const _H = { headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` } };
const _sb = (path) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, _H)
  .then(r => r.json())
  .then(d => { if (Array.isArray(d)) return d; console.warn('[sb] non-array:', path, d); return []; })
  .catch(e => { console.warn('[sb] fetch failed:', path, e.message); return []; });

function _fmtDate(iso) {
  // "2026-02-06" → "Feb 6"
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

async function _loadFromSupabase() {
  try {
    const [appStore, kwds, ytDaily, ytVideos, ytVidDaily, events, userJourney, metaPageDaily, metaPosts, userBehavior] = await Promise.all([
      _sb('app_store_daily?order=date.asc&limit=90'),
      _sb('apple_ads_keywords?order=impressions.desc&limit=50'),
      _sb('youtube_channel_daily?order=date.asc&limit=90'),
      _sb('youtube_videos?order=views.desc&limit=50'),
      _sb('youtube_video_daily?order=date.asc&limit=500'),
      _sb('firebase_events?order=date.asc'),
      _sb('firebase_user_journey?order=updated_at.desc&limit=200'),
      _sb('meta_page_daily?order=date.desc&limit=90'),
      _sb('meta_post_insights?order=date.desc&limit=200'),
      _sb('firebase_user_behavior?order=days_actually_active.desc&limit=500'),
    ]);

    // Each platform has independent fallback — no early return if one is empty

    const hasYT       = Array.isArray(ytDaily)  && ytDaily.length  > 0;
    const hasAppStore = Array.isArray(appStore)  && appStore.length > 0;
    const hasFirebase = Array.isArray(events)    && events.length   > 0;
    const hasKwds     = Array.isArray(kwds)      && kwds.length     > 0;
    const hasVideos   = Array.isArray(ytVideos)  && ytVideos.length > 0;

    const masterDates = hasYT ? ytDaily : hasAppStore ? appStore : null;

    // ── Master date labels (empty if no data) ───────────────
    const FL = masterDates ? masterDates.map(r => _fmtDate(r.date)) : [];

    // ── App Store ───────────────────────────────────────────
    const imp = hasAppStore ? appStore.map(r => r.impressions || 0) : [];
    const pv  = hasAppStore ? appStore.map(r => r.page_views  || 0) : [];
    const dl  = hasAppStore ? appStore.map(r => r.downloads   || 0) : [];

    if (hasAppStore) {
      const _s = (id, v) => { const e=document.getElementById(id); if(e&&v!==null&&v!==undefined) e.textContent=v; };
      const totalDl  = dl.reduce((a,b)=>a+b,0);
      const totalImp = imp.reduce((a,b)=>a+b,0);
      const totalPv  = pv.reduce((a,b)=>a+b,0);
      const peakDl   = Math.max(...dl);
      const peakDate = appStore[dl.indexOf(peakDl)]?.date || '';
      const avgDl    = dl.length ? (totalDl/dl.length).toFixed(1) : '—';
      const dateFrom = appStore[0]?.date || '';
      const dateTo   = appStore[appStore.length-1]?.date || '';
      _s('asDateRange', `App Store Connect · ${dateFrom} → ${dateTo} · iOS`);
      _s('asImpr',      totalImp > 0 ? totalImp.toLocaleString() : '—');
      _s('asImprSub',   totalImp > 0 ? 'Paid + organic' : 'Not available via API');
      _s('asPv',        totalPv  > 0 ? totalPv.toLocaleString() : '—');
      _s('asPvSub',     totalPv  > 0 && totalImp > 0 ? (totalPv/totalImp*100).toFixed(1)+'% of impressions' : '—');
      _s('asDl',        totalDl.toString());
      _s('asDlSub',     `${dateFrom} → ${dateTo}`);
      _s('asAvgDl',     avgDl);
      _s('asPeakDl',    peakDl.toString());
      _s('asPeakDlSub', peakDate ? 'Best: '+peakDate : 'Best single day');
      _s('asDlChartSub', `${totalDl} total downloads · ${dateFrom} → ${dateTo}`);
    }

    // ── YouTube ─────────────────────────────────────────────
    const hasVidDaily = Array.isArray(ytVidDaily) && ytVidDaily.length > 0;
    const ytVw = hasYT ? ytDaily.map(r => r.views || 0) : [];
    if (hasYT) {
      const ctrs = ytDaily.filter(r => r.ctr > 0).map(r => r.ctr);
      const avgCTR = ctrs.length ? (ctrs.reduce((a,b)=>a+b,0)/ctrs.length).toFixed(2) : null;
      const ytCtrEl = document.getElementById('ytCtrKpi'); if (avgCTR && ytCtrEl) ytCtrEl.textContent = avgCTR + '%';

      // ── YouTube Tab KPIs ──────────────────────────────────
      const totalViews   = ytVw.reduce((a,b)=>a+b,0);
      const totalWatch   = ytDaily.reduce((a,r)=>a+(r.watch_time_min||0),0);
      const avgDur       = ytDaily.filter(r=>r.avg_view_duration>0);
      const avgDurVal    = avgDur.length ? Math.round(avgDur.reduce((a,r)=>a+(r.avg_view_duration||0),0)/avgDur.length) : null;
      const subsGained   = ytDaily.reduce((a,r)=>a+(r.subscribers||0),0);
      const avgDaily     = ytVw.length ? Math.round(totalViews/ytVw.length) : 0;
      const peakDay      = ytVw.length ? Math.max(...ytVw) : 0;

      const _set = (id, val) => { const el=document.getElementById(id); if(el&&val!==null) el.textContent=val; };
      _set('yt2TotalViews',  totalViews.toLocaleString());
      _set('yt2WatchTime',   totalWatch >= 1000 ? (totalWatch/1000).toFixed(1)+'k min' : Math.round(totalWatch)+' min');
      _set('yt2AvgDuration', avgDurVal ? avgDurVal+'s' : '—');
      _set('yt2SubsGained',  subsGained > 0 ? '+'+subsGained : '—');
      _set('yt2AvgDaily',    avgDaily);
      _set('yt2PeakDay',     peakDay);

      // date range sub
      const sub = document.getElementById('yt2ViewsSub');
      if(sub) sub.textContent = ytDaily[0]?.date + ' → ' + ytDaily[ytDaily.length-1]?.date;

      // Store data for lazy chart init when YouTube tab is clicked
      const ytFL   = ytDaily.map(r => _fmtDate(r.date));
      const ytWt   = ytDaily.map(r => r.watch_time_min || 0);
      const ytSubs = ytDaily.map(r => r.subscribers    || 0);
      window._ytCharts = { ytFL, ytVw, ytWt, ytSubs };
      window._ytChartsReady = false; // reset so charts re-init on next tab click
    }

    // ── Firebase ────────────────────────────────────────────
    const sessMap = {}, actDMap = {};
    if (hasFirebase) {
      events.forEach(e => {
        if (e.event_name === 'session_start') sessMap[e.date] = (sessMap[e.date] || 0) + e.event_count;
        if (e.event_name === 'app_open')      actDMap[e.date] = e.unique_users || 0;
      });
    }
    const hasSessData = Object.keys(sessMap).length > 0;
    const sess = hasSessData ? FL.map((_, i) => sessMap[(masterDates||[])[i]?.date] || 0) : [];
    const actD = hasSessData ? FL.map((_, i) => actDMap[(masterDates||[])[i]?.date] || 0) : [];

    // ── Keywords ────────────────────────────────────────────
    const kwData = hasKwds
      ? kwds.map(k => ({ kw: k.keyword, imp: k.impressions, taps: k.taps, inst: k.installs, spend: parseFloat(k.spend), cpt: parseFloat(k.cpt) }))
      : [];

    // ── Videos ──────────────────────────────────────────────
    const vids = hasVideos
      ? ytVideos.map(v => ({ t: v.title, v: v.views, imp: v.impressions, ctr: v.ctr, pub: v.published_at ? _fmtDate(v.published_at.slice(0,10)) : '—' }))
      : [];

    // ── Update "Last updated" chip ──────────────────────────
    const lastDate = masterDates ? masterDates[masterDates.length - 1]?.date : null;
    const el = document.querySelector('.hlast');
    if (el) {
      if (lastDate) {
        el.textContent = 'Live data · Last updated: ' + _fmtDate(lastDate);
        el.style.color = '';
      } else {
        el.textContent = 'No pipeline data yet — run the workflow';
        el.style.color = '#c97209';
      }
    }

    // ── Update dynamic date range spans ─────────────────────
    if (masterDates && masterDates.length > 1) {
      const first = _fmtDate(masterDates[0].date);
      const last  = _fmtDate(masterDates[masterDates.length - 1].date);
      const days  = masterDates.length;
      document.querySelectorAll('.dateRange').forEach(span =>
        span.textContent = `${first} – ${last} · ${days} days · iOS · Asthma & COPD`
      );
    }

    const hasJourney = Array.isArray(userJourney) && userJourney.length > 0;

    // ── User Journey — full render ────────────────────────────
    if (hasJourney) {
      const _j = (id, v) => { const e=document.getElementById(id); if(e&&v!=null) e.textContent=v; };
      const N = userJourney.length;

      // ── Core KPIs ──
      const activeU   = userJourney.filter(u => u.current_status === 'active').length;
      const avgDays   = (userJourney.reduce((a,u)=>a+(u.days_active||0),0)/N).toFixed(1);
      const profComplete = userJourney.filter(u =>
        u.profile_about_you && u.profile_symptoms && u.profile_root_causes && u.profile_medication
      ).length;
      _j('ujTotalUsers',  N);
      _j('ujActiveUsers', activeU);
      _j('ujActiveSub',   `${((activeU/N)*100).toFixed(0)}% of total`);
      _j('ujProfilePct',  ((profComplete/N)*100).toFixed(0)+'%');
      _j('ujAvgDays',     avgDays);
      _j('ujUserCount',   N);

      // ── Activity KPIs ──
      const totalSym  = userJourney.reduce((a,u)=>a+(u.hi_symptoms||0),0);
      const totalPfl  = userJourney.reduce((a,u)=>a+(u.hi_peak_flow||0),0);
      const totalSlp  = userJourney.reduce((a,u)=>a+(u.hd_sleep||0),0);
      const totalFlu  = userJourney.reduce((a,u)=>a+(u.hi_flareups||0),0);
      const totalMeep = userJourney.reduce((a,u)=>a+(u.mdric_meeps||0),0);
      _j('ujSymptom',  totalSym);
      _j('ujPeakFlow', totalPfl);
      _j('ujSleep',    totalSlp);
      _j('ujFlareups', totalFlu);
      _j('ujMeeps',    totalMeep);

      // ── MDRIC totals ──
      const totalWk  = userJourney.reduce((a,u)=>a+(u.mdric_weekly||0),0);
      const totalMon = userJourney.reduce((a,u)=>a+(u.mdric_monthly||0),0);
      const totalRep = userJourney.reduce((a,u)=>a+(u.mdric_report||0),0);
      const totalMem = userJourney.reduce((a,u)=>a+(u.mdric_memories||0),0);
      _j('ujWeekly',  totalWk);
      _j('ujMonthly', totalMon);
      _j('ujReports', totalRep);
      _j('ujMemories',totalMem);

      // ── Onboarding Funnel ──
      const funnelSteps = [
        ['About You',     'profile_about_you'],
        ['Symptoms',      'profile_symptoms'],
        ['Root Causes',   'profile_root_causes'],
        ['Medication',    'profile_medication'],
      ];
      const fTbody = document.getElementById('ujFunnelTbody');
      if (fTbody) {
        fTbody.innerHTML = funnelSteps.map(([label, key], i) => {
          const cnt = userJourney.filter(u => u[key]).length;
          const pct = ((cnt/N)*100).toFixed(0);
          const bar = `<div style="background:#e8e4ff;border-radius:4px;height:8px;width:100%"><div style="background:#6c63ff;border-radius:4px;height:8px;width:${pct}%"></div></div>`;
          return `<tr${i%2?' class="ra"':''}><td>${label}</td><td class="num">${cnt}</td><td class="num">${pct}%</td><td style="min-width:80px">${bar}</td></tr>`;
        }).join('');
      }

      // ── Journey Stage Breakdown ──
      const stageMap = {};
      userJourney.forEach(u => { const s=u.journey_stage||'Unknown'; stageMap[s]=(stageMap[s]||0)+1; });
      const stTbody = document.getElementById('ujStageTbody');
      if (stTbody) {
        stTbody.innerHTML = Object.entries(stageMap).sort((a,b)=>b[1]-a[1]).map(([stage,cnt],i) => {
          const pct = ((cnt/N)*100).toFixed(0);
          return `<tr${i%2?' class="ra"':''}><td><strong>${stage}</strong></td><td class="num">${cnt}</td><td class="num">${pct}%</td></tr>`;
        }).join('');
      }

      // ── Health Determinants ──
      const hdKeys = [['Food',       'hd_food'],['Hydration','hd_hydration'],['Sleep','hd_sleep'],['Activity','hd_activity'],['Stress','hd_stress']];
      const hdTbody = document.getElementById('ujHDTbody');
      if (hdTbody) {
        hdTbody.innerHTML = hdKeys.map(([label,key],i) => {
          const tot = userJourney.reduce((a,u)=>a+(u[key]||0),0);
          return `<tr${i%2?' class="ra"':''}><td>${label}</td><td class="num gt">${tot}</td><td class="num">${(tot/N).toFixed(1)}</td></tr>`;
        }).join('');
      }

      // ── Health Indicators ──
      const hiKeys = [['Symptoms','hi_symptoms'],['Flare-ups','hi_flareups'],['Peak Flow','hi_peak_flow'],['Vitals','hi_vitals'],['Surveys','hi_surveys']];
      const hiTbody = document.getElementById('ujHITbody');
      if (hiTbody) {
        hiTbody.innerHTML = hiKeys.map(([label,key],i) => {
          const tot = userJourney.reduce((a,u)=>a+(u[key]||0),0);
          return `<tr${i%2?' class="ra"':''}><td>${label}</td><td class="num gt">${tot}</td><td class="num">${(tot/N).toFixed(1)}</td></tr>`;
        }).join('');
      }

      // ── MDRIC detail table ──
      const mdKeys = [['AI Meeps','mdric_meeps'],['Weekly Reports','mdric_weekly'],['Monthly Reports','mdric_monthly'],['PDF Reports','mdric_report'],['Memories','mdric_memories']];
      const mdTbody = document.getElementById('ujMDRICTbody');
      if (mdTbody) {
        mdTbody.innerHTML = mdKeys.map(([label,key],i) => {
          const tot = userJourney.reduce((a,u)=>a+(u[key]||0),0);
          return `<tr${i%2?' class="ra"':''}><td>${label}</td><td class="num gt">${tot}</td><td class="num">${(tot/N).toFixed(1)}</td></tr>`;
        }).join('');
      }

      // ── Geo Distribution ──
      const geoMap = {}, platMap = {};
      userJourney.forEach(u => {
        const c = u.session_country || u.device_country || '—';
        geoMap[c] = (geoMap[c]||0)+1;
        const p = u.auth_platform || u.app_source || '—';
        platMap[p] = (platMap[p]||0)+1;
      });
      const geoTbody = document.getElementById('ujGeoTbody');
      if (geoTbody) {
        geoTbody.innerHTML = Object.entries(geoMap).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([c,cnt],i) =>
          `<tr${i%2?' class="ra"':''}><td>${c}</td><td class="num">${cnt}</td><td class="num">${((cnt/N)*100).toFixed(0)}%</td></tr>`
        ).join('');
      }
      const platTbody = document.getElementById('ujPlatTbody');
      if (platTbody) {
        platTbody.innerHTML = Object.entries(platMap).sort((a,b)=>b[1]-a[1]).map(([p,cnt],i) =>
          `<tr${i%2?' class="ra"':''}><td>${p}</td><td class="num">${cnt}</td><td class="num">${((cnt/N)*100).toFixed(0)}%</td></tr>`
        ).join('');
      }

      // ── Per-user detail table ──
      const utbody = document.getElementById('ujUserTbody');
      if (utbody) {
        const sorted = [...userJourney].sort((a,b) => (b.days_active||0)-(a.days_active||0));
        utbody.innerHTML = sorted.map((u,i) => {
          const profPct = [u.profile_about_you,u.profile_symptoms,u.profile_root_causes,u.profile_medication].filter(Boolean).length * 25;
          const statusColor = u.current_status==='active' ? 'var(--grn)' : 'var(--t4)';
          return `<tr${i%2?' class="ra"':''}>
            <td style="font-family:monospace">${(u.user_id||'—').slice(0,10)}…</td>
            <td>${u.city||'—'}</td>
            <td>${u.session_country||u.device_country||'—'}</td>
            <td>${u.auth_platform||u.app_source||'—'}</td>
            <td>${u.journey_stage||'—'}</td>
            <td style="color:${statusColor};font-weight:600">${u.current_status||'—'}</td>
            <td class="num">${u.days_active||0}</td>
            <td class="num">${u.total_logs||0}</td>
            <td class="num">${u.hi_symptoms||0}</td>
            <td class="num">${u.hi_peak_flow||0}</td>
            <td class="num gt">${u.mdric_meeps||0}</td>
            <td class="num">${profPct}%</td>
          </tr>`;
        }).join('');
      }
    }

    // ── Meta (FB + IG) ───────────────────────────────────────
    const hasMeta = Array.isArray(metaPosts) && metaPosts.length > 0;
    if (hasMeta) {
      const _m = (id, v) => { const e=document.getElementById(id); if(e&&v!=null) e.textContent=v; };
      const fbPosts = metaPosts.filter(p => p.platform === 'facebook');
      const igPosts = metaPosts.filter(p => p.platform === 'instagram');
      const totalReach = metaPosts.reduce((a,p) => a+(p.reach||0), 0);
      const totalImpr  = metaPosts.reduce((a,p) => a+(p.impressions||0), 0);
      const totalEng   = metaPosts.reduce((a,p) => a+(p.engagement||0), 0);
      // FB page reach from meta_page_daily (sum)
      const fbPageReach = Array.isArray(metaPageDaily)
        ? metaPageDaily.reduce((a,r) => a+(r.reach||0), 0) : 0;
      // IG avg watch time (reels only, in seconds)
      const reelPosts = igPosts.filter(p => p.reels_avg_watch_time_ms > 0);
      const igAvgWatch = reelPosts.length > 0
        ? (reelPosts.reduce((a,p) => a+(p.reels_avg_watch_time_ms||0), 0) / reelPosts.length / 1000).toFixed(1)
        : '—';

      _m('mtTotalReach',  totalReach.toLocaleString());
      _m('mtTotalImpr',   totalImpr.toLocaleString());
      _m('mtTotalEng',    totalEng.toLocaleString());
      _m('mtTotalPosts',  metaPosts.length);
      _m('mtPostsSub',    `${fbPosts.length} FB · ${igPosts.length} IG`);
      _m('mtFbPosts',     fbPosts.length);
      _m('mtFbReach',     fbPageReach.toLocaleString());
      _m('mtIgPosts',     igPosts.length);
      _m('mtIgAvgWatch',  igAvgWatch + (igAvgWatch !== '—' ? 's' : ''));

      // Store globally for filter buttons
      window._mtAllPosts = metaPosts;
      mtFilter('all');
    }

    // ── Firebase User Behavior ──────────────────────────────────
    if (Array.isArray(userBehavior) && userBehavior.length) {
      const N = userBehavior.length;
      const active    = userBehavior.filter(u => u.current_status === 'Active').length;
      const activated = userBehavior.filter(u => u.journey_stage === 'Fully Activated').length;
      const avgSess   = (userBehavior.reduce((s,u) => s+(u.total_sessions||0), 0) / N).toFixed(1);

      const _fb = (id, v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
      _fb('fbTotalUsers',  N);
      _fb('fbActiveUsers', active);
      _fb('fbActivated',   activated);
      _fb('fbAvgSess',     avgSess);

      const stages = ['Fully Activated','Health Profile Done','Reached OTP','Reached Login','Onboarding Only','Bounced'];
      const stageTbody = document.getElementById('fbStageTbody');
      if (stageTbody) stageTbody.innerHTML = stages.map((s,i) => {
        const cnt = userBehavior.filter(u => u.journey_stage === s).length;
        const pct = ((cnt/N)*100).toFixed(0);
        return `<tr${i%2?' class="ra"':''}><td>${s}</td><td class="num">${cnt}</td><td class="num">${pct}%</td></tr>`;
      }).join('');

      const features = [
        ['Today Tab',      'today_tab_visits'],
        ['Symptoms Log',   'symptom_logs'],
        ['Peak Flow',      'peak_flow_logs'],
        ['Sleep Log',      'sleep_logs'],
        ['Treatment View', 'treatment_views'],
        ['Progress View',  'progress_views'],
        ['Health Profile', 'health_profile_events'],
        ['OTP',            'otp_events'],
        ['Login',          'login_events'],
        ['Onboarding',     'onboarding_events'],
      ];
      const featTbody = document.getElementById('fbFeatureTbody');
      if (featTbody) featTbody.innerHTML = features.map(([label,key],i) => {
        const total = userBehavior.reduce((s,u) => s+(u[key]||0), 0);
        const users = userBehavior.filter(u => (u[key]||0) > 0).length;
        return `<tr${i%2?' class="ra"':''}><td>${label}</td><td class="num">${total}</td><td class="num">${users}</td></tr>`;
      }).join('');

      const fbUserTbody = document.getElementById('fbUserTbody');
      if (fbUserTbody) fbUserTbody.innerHTML = userBehavior.map((u,i) => {
        const sc = u.current_status === 'Active' ? 'var(--grn)' : 'var(--t4)';
        return `<tr${i%2?' class="ra"':''}>
          <td style="font-family:monospace;font-size:11px">${(u.user_pseudo_id||'—').slice(0,12)}…</td>
          <td>${u.city||'—'}</td>
          <td>${u.country||'—'}</td>
          <td>${u.journey_stage||'—'}</td>
          <td style="color:${sc};font-weight:600">${u.current_status||'—'}</td>
          <td class="num">${u.days_actually_active||0}</td>
          <td class="num">${u.total_sessions||0}</td>
          <td class="num">${u.total_events||0}</td>
          <td class="num">${u.symptom_logs||0}</td>
          <td class="num">${u.peak_flow_logs||0}</td>
          <td class="num">${u.sleep_logs||0}</td>
        </tr>`;
      }).join('');
    }

    return { FL, imp, pv, dl, sess, actD, ytVw, kwData, vids, ytVideos, ytDaily, hasYT, ytVidDaily, hasVidDaily, appStore, hasAppStore };
  } catch(e) {
    console.error('[dashboard] _loadFromSupabase CRASHED:', e.message, e.stack);
    return null;
  }
}

// ── Meta filter ───────────────────────────────────────────
function mtFilter(platform) {
  const all = window._mtAllPosts || [];
  const rows = platform === 'all' ? all : all.filter(p => p.platform === platform);
  const tbody = document.getElementById('mtPostsTbody');
  const noData = document.getElementById('mtNoData');
  if (!tbody) return;
  // Update button styles
  ['all','facebook','instagram'].forEach(p => {
    const btn = document.getElementById('mtBtn-'+p);
    if (!btn) return;
    btn.style.background = p === platform ? 'var(--meta)' : 'var(--white)';
    btn.style.color      = p === platform ? '#fff'        : 'var(--t2)';
  });
  if (!rows.length) {
    tbody.innerHTML = '';
    if (noData) noData.style.display = 'block';
    return;
  }
  if (noData) noData.style.display = 'none';
  const platBadge = p => p === 'facebook'
    ? `<span style="background:var(--fbl);color:var(--fb);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700">FB</span>`
    : `<span style="background:var(--mtl);color:var(--meta);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700">IG</span>`;
  tbody.innerHTML = rows.map((p, i) => {
    const avgWatch = p.reels_avg_watch_time_ms > 0
      ? (p.reels_avg_watch_time_ms / 1000).toFixed(1) + 's' : '—';
    const cap = (p.message || '').substring(0, 60) + ((p.message||'').length > 60 ? '…' : '');
    return `<tr style="${i%2 ? 'background:#fafbfc' : ''}">
      <td style="padding:8px 10px;white-space:nowrap">${p.date||'—'}</td>
      <td style="padding:8px 10px">${platBadge(p.platform)}</td>
      <td style="padding:8px 10px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t2)">${cap||'—'}</td>
      <td style="padding:8px 10px;text-align:right;font-weight:600">${(p.reach||0).toLocaleString()}</td>
      <td style="padding:8px 10px;text-align:right">${(p.impressions||0).toLocaleString()}</td>
      <td style="padding:8px 10px;text-align:right">${p.likes||0}</td>
      <td style="padding:8px 10px;text-align:right">${p.comments||0}</td>
      <td style="padding:8px 10px;text-align:right">${p.shares||0}</td>
      <td style="padding:8px 10px;text-align:right">${p.saves||0}</td>
      <td style="padding:8px 10px;text-align:right;font-weight:700;color:var(--meta)">${p.engagement||0}</td>
      <td style="padding:8px 10px;text-align:right;color:var(--t3)">${avgWatch}</td>
    </tr>`;
  }).join('');
}

// ── Chart defaults ────────────────────────────────────────
Chart.defaults.font.family = "'Inter', sans-serif";
Chart.defaults.font.size = 11;
Chart.defaults.color = '#5c6e8a';
Chart.defaults.plugins.legend.display = false;

function mkLine(id, labels, datasets, opts={}) {
  const ctx = document.getElementById(id);
  if(!ctx) return;
  return new Chart(ctx, {
    type:'line',
    data:{labels, datasets},
    options:{
      responsive:true, maintainAspectRatio:true,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:datasets.length>1,position:'top',labels:{boxWidth:10,padding:12,font:{size:10}}}},
      scales:{
        x:{grid:{color:'#f0f3fa'},ticks:{maxTicksLimit:10,font:{size:10}}},
        y:{grid:{color:'#f0f3fa'},ticks:{font:{size:10}},...(opts.yAxis||{})}
      },
      elements:{line:{tension:.35},point:{radius:2.5,hoverRadius:5}},
      ...opts.extra
    }
  });
}

function mkBar(id, labels, datasets, opts={}) {
  const ctx = document.getElementById(id);
  if(!ctx) return;
  return new Chart(ctx, {
    type:'bar',
    data:{labels, datasets},
    options:{
      responsive:true, maintainAspectRatio:true,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:datasets.length>1,position:'top',labels:{boxWidth:10,padding:12,font:{size:10}}}},
      scales:{
        x:{grid:{display:false},ticks:{maxTicksLimit:12,font:{size:10}},...(opts.xAxis||{})},
        y:{grid:{color:'#f0f3fa'},ticks:{font:{size:10}},...(opts.yAxis||{})}
      },
      ...opts.extra
    }
  });
}

function mkDonut(id, labels, data, colors) {
  const ctx = document.getElementById(id);
  if(!ctx) return;
  return new Chart(ctx, {
    type:'doughnut',
    data:{labels, datasets:[{data, backgroundColor:colors, borderWidth:2, borderColor:'#fff'}]},
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{legend:{display:true,position:'bottom',labels:{boxWidth:10,padding:10,font:{size:10}}}},
      cutout:'62%'
    }
  });
}

// ── Render all charts with given data ─────────────────────
function renderDashboard({ FL, imp, pv, dl, sess, actD, ytVw, kwData, vids, ytVideos, ytDaily = [], hasYT = false, ytVidDaily = [], hasVidDaily = false, appStore = [], hasAppStore = false }) {

  const hasData  = FL.length > 0;
  const hasKw    = kwData.length > 0;
  const nd       = '<span class="dt">—</span>';
  const fmt      = (n) => n > 0 ? n.toLocaleString() : '—';
  const fmtD     = (n) => n > 0 ? '$' + n.toFixed(2) : '—';

  // ─── APPLE ADS KPI BAND ────────────────────────────────
  {
    const el = document.getElementById('appleKpis');
    const tagEl = document.getElementById('appleSubTag');
    if (el) {
      if (!hasKw) {
        el.innerHTML = `<div class="kpi nd" style="--kc:var(--t4);grid-column:1/-1"><div class="klbl">Apple Search Ads</div><div class="kval" style="font-size:16px">⏳ No data yet</div><div class="ksub">Add APPLE_ADS_* secrets to GitHub and run the workflow</div></div>`;
        if (tagEl) tagEl.textContent = 'Waiting for pipeline';
      } else {
        const spend    = kwData.reduce((a,k)=>a+k.spend,0);
        const imprT    = kwData.reduce((a,k)=>a+k.imp,0);
        const tapsT    = kwData.reduce((a,k)=>a+k.taps,0);
        const instT    = kwData.reduce((a,k)=>a+k.inst,0);
        const tapRate  = imprT > 0 ? ((tapsT/imprT)*100).toFixed(2)+'%' : '—';
        const cpi      = instT > 0 ? '$'+(spend/instT).toFixed(2) : '—';
        const avgCpt   = tapsT > 0 ? '$'+(spend/tapsT).toFixed(2) : '—';
        if (tagEl) tagEl.textContent = `LIVE · $${spend.toFixed(2)}`;
        el.innerHTML = `
          <div class="kpi" style="--kc:var(--apple)"><div class="klbl">Total Spend</div><div class="kval">$${spend.toFixed(2)}</div><div class="ksub">Live from Supabase</div></div>
          <div class="kpi" style="--kc:var(--apple)"><div class="klbl">Impressions</div><div class="kval">${imprT.toLocaleString()}</div><div class="ksub">Keyword-matched</div></div>
          <div class="kpi" style="--kc:var(--t3)"><div class="klbl">Taps</div><div class="kval">${tapsT.toLocaleString()}</div><div class="ksub">${tapRate} tap rate</div></div>
          <div class="kpi" style="--kc:var(--grn)"><div class="klbl">Installs</div><div class="kval">${instT}</div><div class="ksub up">Confirmed tap-through</div></div>
          <div class="kpi" style="--kc:var(--org)"><div class="klbl">CPI</div><div class="kval">${cpi}</div><div class="ksub wa">Cost per install</div></div>
          <div class="kpi" style="--kc:var(--t3)"><div class="klbl">Avg CPT</div><div class="kval">${avgCpt}</div><div class="ksub">Cost per tap</div></div>
        `;
      }
    }
  }

  // ─── KEYWORD TABLE TFOOT ───────────────────────────────
  {
    const tfoot = document.getElementById('kwTfoot');
    if (tfoot && hasKw) {
      const spendT  = kwData.reduce((a,k)=>a+k.spend,0);
      const imprT   = kwData.reduce((a,k)=>a+k.imp,0);
      const tapsT   = kwData.reduce((a,k)=>a+k.taps,0);
      const instT   = kwData.reduce((a,k)=>a+k.inst,0);
      const avgCpt  = tapsT>0 ? '$'+(spendT/tapsT).toFixed(2)+' avg' : '—';
      tfoot.innerHTML = `<tr>
        <td><strong>TOTAL</strong></td>
        <td class="num">${imprT.toLocaleString()}</td>
        <td class="num">${tapsT}</td>
        <td class="num gt">${instT}</td>
        <td class="num">$${spendT.toFixed(2)}</td>
        <td class="num">${avgCpt}</td>
        <td></td>
      </tr>`;
    }
  }
  // ─── YOUTUBE VIDEO TABLE ────────────────────────────────
  // Build per-video aggregate map from daily rows
  const vidMap = {};
  (ytVidDaily || []).forEach(r => {
    if (!vidMap[r.video_id]) vidMap[r.video_id] = { watch:0, likes:0, comments:0, dur:[], views:0 };
    vidMap[r.video_id].watch    += (r.watch_time_min || 0);
    vidMap[r.video_id].likes    += (r.likes    || 0);
    vidMap[r.video_id].comments += (r.comments || 0);
    vidMap[r.video_id].views    += (r.views    || 0);
    if (r.avg_view_duration > 0) vidMap[r.video_id].dur.push(r.avg_view_duration);
  });
  {
    const tbody = document.getElementById('yt2VidBody');
    const ytVidArr = Array.isArray(ytVideos) ? ytVideos : [];
    if(tbody && ytVidArr.length > 0) {
      tbody.innerHTML = '';
      ytVidArr.forEach((v,i) => {
        const agg    = vidMap[v.video_id] || {};
        const wt     = agg.watch ? Math.round(agg.watch) : '—';
        const likes  = agg.likes || (v.likes||0);
        const cmts   = agg.comments || (v.comments||0);
        const durArr = agg.dur||[];
        const dur    = durArr.length ? Math.round(durArr.reduce((a,b)=>a+b,0)/durArr.length) : '—';
        const pub    = v.published_at ? _fmtDate(v.published_at.slice(0,10)) : '—';
        const views  = (v.views||agg.views||0).toLocaleString(); // prefer youtube_videos (correctly upserted) over daily aggregate
        tbody.innerHTML += `<tr class="${i%2===0?'ra':''}">
          <td style="max-width:260px"><div style="font-size:11px;font-weight:500;color:var(--t1);line-height:1.4">${v.title||'—'}</div></td>
          <td class="num"><strong>${views}</strong></td>
          <td class="num">${wt}</td>
          <td class="num">${likes||'—'}</td>
          <td class="num">${cmts||'—'}</td>
          <td class="num">${dur}</td>
          <td style="font-size:11px;color:var(--t3)">${pub}</td>
        </tr>`;
      });
    } else if(tbody) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--t3);padding:20px">No video data in Supabase yet — run GitHub Actions workflow</td></tr>';
    }
  }

  // ─── APP STORE IMPRESSIONS SPLIT ────────────────────────
  const totalImp   = imp.reduce((a,b)=>a+b,0);
  const paidTotal  = hasKw ? kwData.reduce((a,k)=>a+k.imp,0) : 0;
  const orgTotal   = Math.max(0, totalImp - paidTotal);
  // Legend and subtitle update
  {
    const subEl = document.getElementById('imprSplitSub');
    const legA  = document.getElementById('imprLegApple');
    const legO  = document.getElementById('imprLegOrganic');
    if (subEl) subEl.textContent = totalImp > 0 ? `${totalImp.toLocaleString()} total App Store impressions` : 'No App Store data yet';
    if (legA)  legA.textContent  = paidTotal > 0 ? `Apple Ads ${paidTotal.toLocaleString()} (${totalImp>0?((paidTotal/totalImp)*100).toFixed(1)+'%':'—'})` : 'Apple Ads (—)';
    if (legO)  legO.textContent  = orgTotal  > 0 ? `Organic ${orgTotal.toLocaleString()} (${totalImp>0?((orgTotal/totalImp)*100).toFixed(1)+'%':'—'})`   : 'Organic (—)';
  }
  // ─── DOWNLOAD ATTRIBUTION DONUT ─────────────────────────
  const totalDl  = dl.reduce((a,b)=>a+b,0);
  const paidDl   = hasKw ? kwData.reduce((a,k)=>a+k.inst,0) : 0;
  const ytDl     = 0;
  const orgDl    = Math.max(0, totalDl - paidDl - ytDl);
  // ─── EFFICIENCY COMPARISON STEPS ────────────────────────
  {
    const appleInst  = hasKw ? kwData.reduce((a,k)=>a+k.inst,0) : 0;
    const appleSpend = hasKw ? kwData.reduce((a,k)=>a+k.spend,0) : 0;
    const appleCpi   = appleInst > 0 ? '$'+(appleSpend/appleInst).toFixed(2) : '—';
    const _s = (id, v) => { const e = document.getElementById(id); if(e) e.textContent = v; };
    _s('eff-apple-sub', hasKw ? `${appleInst} confirmed installs · $${appleSpend.toFixed(2)}` : 'No data — run pipeline');
    _s('eff-apple-cpi', hasKw && appleInst > 0 ? appleCpi : '—');
    _s('kwCardSub', hasKw ? `${kwData.length} keywords · sorted by impressions · total ${paidTotal.toLocaleString()} impr` : 'No keyword data yet — run pipeline');
  }

  // ─── APP STORE IMPRESSIONS STACKED ──────────────────────
  const paidImprArr = imp.map(()=>0); // will use kwData-based paid if available
  const orgImprArr  = imp.map((v)=>v);
  // ─── DOWNLOAD DAY CHART ─────────────────────────────────
  // ─── App Store Daily Downloads Table ────────────────────
  {
    const tbody = document.getElementById('asDailyTbody');
    const tfoot = document.getElementById('asDailyTfoot');
    if (tbody) {
      if (hasAppStore && appStore.length > 0) {
        const rows = appStore.filter(r => (r.downloads||0) > 0);
        const lastRow = appStore[appStore.length-1];
        const total = appStore.reduce((a, r) => a + (r.downloads || 0), 0);
        const lastDate = lastRow?.date || '';
        tbody.innerHTML = rows.map((r,i) =>
          `<tr${i%2?' class="ra"':''}><td>${r.date}</td><td class="num gt">${r.downloads}</td></tr>`
        ).join('');
        if (tfoot) tfoot.innerHTML = `<tr style="background:var(--gnl);font-weight:700">
          <td>Total · up to ${lastDate}</td>
          <td class="num gt" style="font-size:15px">${total}</td>
        </tr>`;
        const sub = document.getElementById('asDlChartSub');
        if (sub) sub.textContent = `${total} total downloads · up to ${lastDate}`;
      } else {
        tbody.innerHTML = `<tr><td colspan="2" class="dt" style="text-align:center;padding:24px">No App Store data yet — run the pipeline</td></tr>`;
      }
    }
  }

  // ─── KEYWORD TABLE ──────────────────────────────────────
  {
    const tbody = document.getElementById('kwBody');
    if(tbody && kwData.length) {
      tbody.innerHTML = '';
      const maxImp = Math.max(...kwData.map(k=>k.imp));
      kwData.forEach(k=>{
        const pct = (k.imp/maxImp*100).toFixed(1);
        const result = k.inst>0
          ? `<span class="pill pG">✓ Install</span>`
          : k.taps>0
            ? `<span class="pill po">Taps only</span>`
            : `<span class="pill px">No taps</span>`;
        const cptStr   = k.cpt===0   ? '<span class="dt">—</span>' : `$${k.cpt.toFixed(2)}`;
        const spendStr = k.spend===0 ? '<span class="dt">—</span>' : `$${k.spend.toFixed(2)}`;
        tbody.innerHTML += `<tr class="${k.inst>0?'ra':''}">
          <td><strong>${k.kw}</strong></td>
          <td><div class="kwbar"><div class="kwtrk"><div class="kwfil" style="width:${pct}%;background:var(--apple)"></div></div><span style="font-size:10px;color:var(--t2);font-weight:600;min-width:30px">${k.imp}</span></div></td>
          <td class="num">${k.taps}</td>
          <td class="num ${k.inst>0?'gt':''}">${k.inst}</td>
          <td class="num">${spendStr}</td>
          <td class="num">${cptStr}</td>
          <td>${result}</td>
        </tr>`;
      });
    }
  }

  // ─── VIDEO TABLE ────────────────────────────────────────
  {
    const tbody = document.getElementById('vidBody');
    if(tbody && vids.length) {
      tbody.innerHTML = '';
      vids.forEach((v,i)=>{
        const ctrCls = v.ctr>=5?'gt':v.ctr>=2?'ot':'rt';
        tbody.innerHTML += `<tr class="${i%2===0?'ra':''}">
          <td style="max-width:280px"><div style="font-size:11px;font-weight:500;color:var(--t1);line-height:1.4">${v.t}</div></td>
          <td class="num">${v.v}</td>
          <td class="num">${(v.imp||0).toLocaleString()}</td>
          <td class="num ${ctrCls}">${v.ctr}%</td>
          <td style="font-size:11px;color:var(--t3)">${v.pub}</td>
        </tr>`;
      });
    }
  }
}

// ─── Tab switcher ─────────────────────────────────────────
document.querySelectorAll('.hn[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.hn[data-tab]').forEach(b => b.classList.remove('act'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('act');
    document.getElementById(btn.dataset.tab).classList.add('active');
    // Lazy init YouTube charts on first visit (inside setTimeout so DOM reflows first)
    if (btn.dataset.tab === 't-youtube' && !window._ytChartsReady && window._ytCharts) {
      setTimeout(() => {
        const {ytFL, ytVw, ytWt, ytSubs} = window._ytCharts;
        mkLine('yt2ViewsChart', ytFL, [{label:'Views', data:ytVw, borderColor:'#d42b2b', backgroundColor:'rgba(212,43,43,.1)', fill:true, borderWidth:2}]);
        mkLine('yt2WatchChart', ytFL, [{label:'Watch Time (min)', data:ytWt, borderColor:'#e8743b', backgroundColor:'rgba(232,116,59,.1)', fill:true, borderWidth:2}]);
        mkBar('yt2SubsChart',   ytFL, [{label:'Subs Gained', data:ytSubs, backgroundColor:'rgba(16,185,129,.7)', borderRadius:4}]);
        window._ytChartsReady = true;
      }, 100);
    }
    // Resize all charts
    if (typeof Chart !== 'undefined') {
      setTimeout(() => Object.values(Chart.instances).forEach(c => { try { c.resize(); } catch(e){} }), 150);
    }
  });
});

// ─── Boot ────────────────────────────────────────────────
async function boot() {
  // Show loading indicator
  const lastEl = document.querySelector('.hlast');
  if (lastEl) lastEl.textContent = 'Loading live data…';

  const isConfigured = SUPABASE_URL.startsWith('https://') && SUPABASE_ANON.startsWith('eyJ');
  let data = null;
  let isLive = false;

  if (isConfigured) {
    data = await _loadFromSupabase();
    if (data) isLive = true;
  }

  // No data — show empty state (no fake static fallback)
  if (!data) {
    data = { FL: [], imp: [], pv: [], dl: [], sess: [], actD: [], ytVw: [], kwData: [], vids: [], ytDaily: [], hasYT: false, ytVidDaily: [], hasVidDaily: false };
    if (lastEl) {
      lastEl.textContent = 'No pipeline data — connect platforms to see live data';
      lastEl.style.color = '#c97209';
    }
  }

  try {
    renderDashboard(data);
  } catch(e) {
    console.error('[renderDashboard] CRASH at:', e.message);
    console.error('[renderDashboard] Stack:', e.stack);
  }
}

boot();
</script>
